<!-- WALLAFLY WALLPAPER UPLOAD -->

<section class="wallpaper-upload">

        <div class="inputs">

                <input type="text" id="wallpaperName" placeholder="Ex: Neon City">
            </div>

            <div class="inputBox">

        <!-- PREVIEW -->

<script>

const wallpaperInput = document.getElementById("wallpaperInput");

const previewContainer = document.getElementById("previewContainer");

const previewImage = document.getElementById("previewImage");

/* IMAGE PREVIEW */

wallpaperInput.addEventListener("change", function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            previewImage.src = e.target.result;

            previewContainer.style.display = "flex";
        }

        reader.readAsDataURL(file);
    }

});

function addWallpaper(){

    const imageName =
    document.getElementById("imageName").value;

    const authorPseudo =
    document.getElementById("authorPseudo").value;

    const authorEmail =
    document.getElementById("authorEmail").value;

    if(
        imageName === "" ||
        authorPseudo === "" ||
        authorEmail === "" ||
        !previewImage.src
    ){
        alert("❌ Remplis tous les champs.");
        return;
    }

    // 🔥 WEBHOOK DISCORD
    const webhookURL = "https://discord.com/api/webhooks/1507740578215891004/kSldgnmZKBw4xiVkpDDfiktxjxvlGwrwUcKDiTzuV5BmmKFClvQwqJ9MMS8eRvCBO-Oo";

    const payload = {
        content: "🖼️ Nouveau wallpaper reçu !",
        embeds: [
            {
                title: imageName,
                color: 5814783,
                fields: [
                    { name: "👤 Auteur", value: authorPseudo, inline: true },
                    { name: "✉️ Email", value: authorEmail, inline: true }
                ],
                image: {
                    url: previewImage.src
                }
            }
        ]
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    })
    .then(() => {
        alert("✅ Wallpaper envoyé à WallaFly, nous l'ajouterons dans un délai de 48H.");
    })
    .catch(() => {
        alert("❌ Erreur envoi ");
    });

}

</script>
