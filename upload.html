<!-- WALLFLY WALLPAPER UPLOAD -->

<section class="wallpaper-upload">

    <div class="upload-box">

        <h1>🖼️ Upload un Wallpaper</h1>

        <p>Ajoute ton fond d’écran à la galerie WallaFly 🚀</p>

        <!-- INFOS -->
        <div class="inputs">

            <div class="inputBox">
                <label>📸 Nom du wallpaper</label>
                <input type="text" id="wallpaperName" placeholder="Ex: Neon City">
            </div>

            <div class="inputBox">
                <label>👤 Pseudo de l’auteur</label>
                <input type="text" id="authorName" placeholder="Ex: NohamDev">
            </div>

            <div class="inputBox">
                <label>✉️ Email de l’auteur</label>
                <input type="email" id="authorEmail" placeholder="Ex: noham@email.com">
            </div>

        </div>

        <!-- UPLOAD -->
        <label for="wallpaperInput" class="upload-area">

            <div class="icon">📤</div>
            <h2>Ajoute ton image</h2>
            <span>Clique ici ou glisse ton wallpaper</span>

            <input type="file" id="wallpaperInput" accept="image/*">

        </label>

        <!-- PREVIEW -->
        <div class="preview-container" id="previewContainer">
            <img id="previewImage">
        </div>

        <button onclick="addWallpaper()">⚡ Publier dans la galerie</button>

    </div>

</section>

<style>
.wallpaper-upload{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
    background:
    radial-gradient(circle at top left,#8a2eff33,transparent 30%),
    radial-gradient(circle at bottom right,#00d9ff33,transparent 30%),
    #080b14;
}

.upload-box{
    width:100%;
    max-width:750px;
    padding:50px;
    border-radius:35px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    text-align:center;
    color:white;
}

h1{
    font-size:42px;
    margin-bottom:10px;
    background:linear-gradient(90deg,#00d9ff,#8a2eff,#ff3cac);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    margin-bottom:30px;
    color:#cfcfcf;
}

.inputs{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-bottom:25px;
}

.inputBox{
    text-align:left;
}

.inputBox input{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.05);
    color:white;
}

.upload-area{
    width:100%;
    min-height:250px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.upload-area input{
    display:none;
}

.icon{
    font-size:60px;
}

.preview-container{
    margin-top:20px;
    display:none;
}

.preview-container img{
    width:100%;
    border-radius:20px;
}

button{
    margin-top:25px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#00d9ff,#8a2eff,#ff3cac);
}
</style>

<script>
const wallpaperInput = document.getElementById("wallpaperInput");
const previewContainer = document.getElementById("previewContainer");
const previewImage = document.getElementById("previewImage");

wallpaperInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        previewImage.src = e.target.result;
        previewContainer.style.display = "block";
    };
    reader.readAsDataURL(file);
});

function addWallpaper(){

    const wallpaperName = document.getElementById("wallpaperName").value;
    const authorName = document.getElementById("authorName").value;
    const authorEmail = document.getElementById("authorEmail").value;

    if(!wallpaperName || !authorName || !authorEmail || !previewImage.src){
        alert("❌ Remplis tous les champs.");
        return;
    }

    const webhookURL = "https://discord.com/api/webhooks/1507740578215891004/kSldgnmZKBw4xiVkpDDfiktxjxvlGwrwUcKDiTzuV5BmmKFClvQwqJ9MMS8eRvCBO-Oo";

    const payload = {
        content: "🖼️ Nouveau wallpaper reçu !",
        embeds: [{
            title: wallpaperName,
            color: 5814783,
            fields: [
                { name: "👤 Auteur", value: authorName, inline: true },
                { name: "✉️ Email", value: authorEmail, inline: true }
            ],
            image: { url: previewImage.src }
        }]
    };

    fetch("/api/upload", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
})
.then(() => alert("✅ Wallpaper envoyé à WallaFly !"))
.catch(() => alert("❌ Erreur d’envoi"));
</script>
